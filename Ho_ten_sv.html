<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra mật khẩu</title>
</head>
<body>

<h2>Kiểm tra mật khẩu</h2>

<script>
    // Hàm kiểm tra mật khẩu
    function kiemTraMatKhau(mk) {
        // Kiểm tra từng tiêu chí
        if (mk.length < 8) {
            return { hopLe: false, loi: "Mật khẩu phải có ít nhất 8 ký tự!" };
        }
        if (!/[A-Z]/.test(mk)) {
            return { hopLe: false, loi: "Mật khẩu phải có ít nhất 1 chữ cái viết HOA (A-Z)!" };
        }
        if (!/[a-z]/.test(mk)) {
            return { hopLe: false, loi: "Mật khẩu phải có ít nhất 1 chữ cái viết thường (a-z)!" };
        }
        if (!/[0-9]/.test(mk)) {
            return { hopLe: false, loi: "Mật khẩu phải có ít nhất 1 chữ số (0-9)!" };
        }
        if (!/[@#$%]/.test(mk)) {
            return { hopLe: false, loi: "Mật khẩu phải có ít nhất 1 ký tự đặc biệt (@, #, $, %)!" };
        }

        // Nếu qua hết => hợp lệ, xác định độ mạnh
        let doManh;
        if (mk.length >= 12) {
            doManh = "Mạnh 💪";
        } else {
            doManh = "Trung bình 👍";
        }

        // Trường hợp chỉ vừa đủ 8 ký tự (8-11 ký tự) => Yếu
        // Nhưng bài yêu cầu: Yếu = chỉ vừa đủ 8 ký tự
        // => Ý là: nếu đúng 8 ký tự thì Yếu, 9-11 là Trung bình, 12+ là Mạnh
        if (mk.length === 8) {
            doManh = "Yếu ⚠️";
        } else if (mk.length >= 9 && mk.length < 12) {
            doManh = "Trung bình 👍";
        } else {
            doManh = "Mạnh 💪";
        }

        return { hopLe: true, doManh: doManh };
    }

    // Vòng lặp yêu cầu nhập mật khẩu cho đến khi hợp lệ
    while (true) {
        let matKhau = prompt("Nhập mật khẩu của bạn:");

        // Nếu người dùng bấm Cancel
        if (matKhau === null) {
            alert("Bạn đã hủy nhập mật khẩu.");
            break;
        }

        let ketQua = kiemTraMatKhau(matKhau);

        if (!ketQua.hopLe) {
            // Mật khẩu không hợp lệ => báo lỗi và yêu cầu nhập lại
            alert("❌ " + ketQua.loi + "\nVui lòng nhập lại!");
        } else {
            // Mật khẩu hợp lệ => thông báo và thoát vòng lặp
            alert("✅ Mật khẩu hợp lệ!\nĐộ mạnh: " + ketQua.doManh);
            break;
        }
    }
</script>

</body>
</html>
